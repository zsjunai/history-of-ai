<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 深蓝黑背景，沉稳有书卷气 -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- 神经网络连接线：天蓝品牌色 -->
  <g stroke="#38bdf8" stroke-width="1.6" stroke-linecap="round" opacity="0.7" fill="none">
    <line x1="14" y1="22" x2="32" y2="32"/>
    <line x1="14" y1="42" x2="32" y2="32"/>
    <line x1="32" y1="32" x2="50" y2="22"/>
    <line x1="32" y1="32" x2="50" y2="42"/>
  </g>

  <!-- 四个输入输出节点：天蓝 -->
  <g fill="#38bdf8">
    <circle cx="14" cy="22" r="3.5"/>
    <circle cx="14" cy="42" r="3.5"/>
    <circle cx="50" cy="22" r="3.5"/>
    <circle cx="50" cy="42" r="3.5"/>
  </g>

  <!-- 中心节点：白色主体 + 淡蓝光环，模拟激活 -->
  <circle cx="32" cy="32" r="10" fill="#38bdf8" opacity="0.18"/>
  <circle cx="32" cy="32" r="6" fill="#ffffff"/>
</svg>
