<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Circuit lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.3">
    <line x1="8" y1="8" x2="8" y2="20"/>
    <line x1="8" y1="8" x2="20" y2="8"/>
    <line x1="56" y1="56" x2="56" y2="44"/>
    <line x1="56" y1="56" x2="44" y2="56"/>
    <line x1="56" y1="8" x2="44" y2="8"/>
    <line x1="56" y1="8" x2="56" y2="20"/>
    <line x1="8" y1="56" x2="20" y2="56"/>
    <line x1="8" y1="56" x2="8" y2="44"/>
  </g>

  <!-- Corner nodes -->
  <g fill="#00f0ff" opacity="0.5">
    <circle cx="8" cy="8" r="1.5"/>
    <circle cx="56" cy="8" r="1.5"/>
    <circle cx="8" cy="56" r="1.5"/>
    <circle cx="56" cy="56" r="1.5"/>
  </g>

  <!-- Neural network dots -->
  <g fill="#7b61ff" opacity="0.25">
    <circle cx="20" cy="22" r="1"/>
    <circle cx="44" cy="22" r="1"/>
    <circle cx="16" cy="42" r="1"/>
    <circle cx="48" cy="42" r="1"/>
    <circle cx="32" cy="12" r="1"/>
    <circle cx="32" cy="52" r="1"/>
  </g>

  <!-- "AI" text with glow -->
  <text x="32" y="16" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" font-weight="700" fill="url(#glow)" text-anchor="middle" filter="url(#neon)" letter-spacing="2">AI</text>

  <!-- "史" character -->
  <text x="32" y="48" font-family="'Noto Serif SC', 'Source Han Serif', serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#neon)">史</text>

  <!-- Subtle scan line -->
  <rect x="0" y="30" width="64" height="0.5" fill="url(#glow)" opacity="0.1"/>
</svg>
