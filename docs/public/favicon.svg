<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- 圆角方块背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 神经网络连接线（2 → 1 → 2 结构，半透明白） -->
  <g stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.75" fill="none">
    <!-- 左两点到中心 -->
    <line x1="14" y1="22" x2="32" y2="32"/>
    <line x1="14" y1="42" x2="32" y2="32"/>
    <!-- 中心到右两点 -->
    <line x1="32" y1="32" x2="50" y2="22"/>
    <line x1="32" y1="32" x2="50" y2="42"/>
  </g>

  <!-- 左侧输入层（2 节点） -->
  <circle cx="14" cy="22" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="14" cy="42" r="4" fill="#ffffff" opacity="0.95"/>

  <!-- 右侧输出层（2 节点） -->
  <circle cx="50" cy="22" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="50" cy="42" r="4" fill="#ffffff" opacity="0.95"/>

  <!-- 中心隐藏层节点（稍大，带外圈光环） -->
  <circle cx="32" cy="32" r="9" fill="#ffffff" opacity="0.25"/>
  <circle cx="32" cy="32" r="6" fill="#ffffff"/>
</svg>
